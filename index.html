<!DOCTYPE html>
<html lang="ja" data-theme="light" data-fontsize="3">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>JWWA 2026 — MC Script Reader</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <!-- ===== SELECTOR SCREEN ===== -->
  <div id="selector-screen" style="display: flex; flex-direction: column;">

    <div class="selector-header">
      <div class="selector-logo">Japanese Wagyu World Auction 2026</div>
      <div class="selector-title">MC Script Reader</div>
      <div class="selector-clock-area">
        <div id="selector-clock" class="selector-clock">--:--:--</div>
        <div id="selector-date" class="selector-date">...</div>
      </div>
    </div>

    <div class="event-grid">

      <!-- 前夜祭 -->
      <div class="event-card" onclick="loadEvent('zenjasai')">
        <div class="event-day-tag">April 3 (Fri) · DAY 1</div>
        <div class="event-card-title">前夜祭</div>
        <div class="event-card-time">17:00 — 20:30</div>
        <div class="event-card-venue">ホテル日航姫路　光琳の間（3F）</div>
        <div class="event-card-mc">
          <span class="mc-badge mc1">Justin</span>
          <span class="mc-badge mc2">Marika</span>
        </div>
      </div>

      <!-- オークション当日 -->
      <div class="event-card" onclick="loadEvent('toujitsu')">
        <div class="event-day-tag">April 4 (Sat) · DAY 2</div>
        <div class="event-card-title">オークション当日</div>
        <div class="event-card-time">10:00 — 12:00</div>
        <div class="event-card-venue">和牛マスター株式会社</div>
        <div class="event-card-mc">
          <span class="mc-badge mc1">Marika</span>
        </div>
      </div>

      <!-- 花見の宴 -->
      <div class="event-card" onclick="loadEvent('hanami')">
        <div class="event-day-tag">April 4 (Sat) · DAY 2</div>
        <div class="event-card-title">花見の宴</div>
        <div class="event-card-time">12:30 — 14:30</div>
        <div class="event-card-venue">姫路市和牛マスター食肉センター</div>
        <div class="event-card-mc">
          <span class="mc-badge mc1">中川</span>
          <span class="mc-badge mc2">Horota</span>
        </div>
      </div>

    </div><!-- /.event-grid -->

    <div class="selector-footer">
      <button class="selector-footer-btn" onclick="toggleTheme()">
        <span class="theme-icon"></span>
        <span data-i18n="themeToggle"></span>
      </button>
      <button class="selector-footer-btn" onclick="toggleLang()">
        <span data-i18n="langSwitch"></span>
      </button>
    </div>

  </div><!-- /#selector-screen -->


  <!-- ===== VIEWER SCREEN ===== -->
  <div id="viewer-screen" style="display: none; flex-direction: column;">

    <!-- Top Bar -->
    <div id="topbar">
      <button id="back-btn" onclick="goBack()">←</button>
      <div id="topbar-event">
        <div id="topbar-event-title">—</div>
        <div id="topbar-part-hint"></div>
      </div>
      <div id="topbar-time-block">
        <div id="topbar-clock">--:--</div>
        <div id="time-status" class="status-before">—</div>
      </div>
    </div>

    <!-- Part Nav -->
    <div id="part-nav">
      <div id="part-tabs"></div>
    </div>

    <!-- Controls Bar -->
    <div id="controls-bar">

      <!-- MC Filter -->
      <div class="controls-group" id="mc-filter-group">
        <!-- Populated by JS -->
      </div>

      <div class="controls-sep"></div>

      <!-- Font Size -->
      <div class="controls-group">
        <button class="font-btn" onclick="changeFontSize(-1)">A−</button>
        <button class="font-btn font-btn-reset" onclick="changeFontSize(0)" data-i18n="fontReset"></button>
        <button class="font-btn" onclick="changeFontSize(+1)">A＋</button>
      </div>

      <div class="controls-sep"></div>

      <!-- Language Toggle -->
      <button class="ctrl-btn" onclick="toggleLang()" id="lang-btn" data-i18n="langSwitch"></button>

      <div class="controls-sep"></div>

      <!-- Theme Toggle -->
      <button class="ctrl-btn" id="theme-btn" onclick="toggleTheme()">
        <span class="theme-icon"></span>
      </button>

    </div><!-- /#controls-bar -->

    <!-- Script Content -->
    <div id="script-scroll" role="main">
      <!-- Rendered by JS -->
    </div>

    <!-- Floating Chapter Navigation -->
    <div id="chapter-nav">
      <button class="chapter-nav-btn" id="chapter-prev" onclick="navPart(-1)" title="前のパート">▲</button>
      <button class="chapter-nav-btn" id="chapter-next" onclick="navPart(+1)" title="次のパート">▼</button>
    </div>

  </div><!-- /#viewer-screen -->

</div><!-- /#app -->

<script src="js/app.js"></script>
</body>
</html>
