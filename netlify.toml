[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=600"
    Content-Type = "application/json; charset=utf-8"
